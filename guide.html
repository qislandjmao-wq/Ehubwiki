<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Ehub Wiki - 指南</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown.css">
    <style>
        body { display: flex; margin: 0; font-family: sans-serif; }
        #sidebar { width: 250px; height: 100vh; background: #f6f8fa; border-right: 1px solid #e1e4e8; padding: 20px; box-sizing: border-box; position: fixed; }
        #content { margin-left: 250px; padding: 40px; flex: 1; }
        .markdown-body { box-sizing: border-box; min-width: 200px; max-width: 980px; margin: 0 auto; }
        .nav-link { display: block; padding: 8px 0; color: #0366d6; text-decoration: none; border-bottom: 1px solid #eaecef; }
        .nav-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div id="sidebar">正在加载目录...</div>
    <div id="content">
        <article id="view" class="markdown-body"></article>
    </div>
    <script>
        // 动态加载侧边栏
        fetch('sidebar.html')
            .then(response => response.text())
            .then(html => {
                document.getElementById('sidebar').innerHTML = html;
            });

        // 加载内容
        fetch('guide.md')
            .then(response => response.text())
            .then(text => {
                document.getElementById('view').innerHTML = marked.parse(text);
            });
    </script>
</body>
</html>
