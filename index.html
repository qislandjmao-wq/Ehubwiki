<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Ehub Wiki</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Ehub Wiki 简约文档中心">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>
<body>
  <div id="app">正在加载 Wiki 内容...</div>
  <script>
    window.$docsify = {
      name: 'Ehub Wiki',
      repo: 'qislandjmao-wq/Ehubwiki',
      loadSidebar: true, // 启用侧边栏
      autoHeader: true,  // 自动根据 md 的一级标题生成页面标题
      subMaxLevel: 2,
      homepage: 'README.md'
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
</body>
</html>
